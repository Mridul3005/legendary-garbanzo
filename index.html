<!DOCTYPE html>
<html>
<body>
    <h1>Group Chat</h1>
    <div id="messages"></div>
    <input id="messageText" autocomplete="off"/><button onclick="sendMessage()">Send</button>
    <script>
        // Ask for a username
        var username = prompt("Enter your name:") || "Anonymous";

        // Smart protocol selector: use wss:// for https, and ws:// for http
        var protocol = window.location.protocol === "https:" ? "wss://" : "ws://";
        var ws = new WebSocket(protocol + window.location.host + "/ws");

        ws.onmessage = function(event) {
            var messages = document.getElementById('messages');
            var message = document.createElement('div');
            message.textContent = event.data;
            messages.appendChild(message);
        };

        function sendMessage() {
            var input = document.getElementById("messageText");
            if (input.value.trim() !== "") {
                // Send the username along with the message
                ws.send(username + ": " + input.value);
                input.value = '';
            }
        }
    </script>
</body>
</html>
